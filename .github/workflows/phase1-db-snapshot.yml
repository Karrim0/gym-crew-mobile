name: Phase 1 Database Snapshot

on:
  push:
    branches:
      - phase/1-database-source-of-truth
    paths:
      - .github/workflows/phase1-db-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: Export remote database baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is missing"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is missing"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID is missing"; exit 1; }

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Dump public schema
        run: supabase db dump --linked --schema public -f artifacts/remote_public_schema.sql

      - name: Generate TypeScript database types
        run: supabase gen types typescript --linked --schema public > artifacts/database.types.generated.ts

      - name: Lint linked database
        shell: bash
        run: |
          set +e
          supabase db lint --linked 2>&1 | tee artifacts/db-lint.txt
          status=${PIPESTATUS[0]}
          echo "db_lint_exit_code=$status" > artifacts/db-lint-status.txt
          exit 0

      - name: Export migration history
        run: supabase migration list --linked > artifacts/migration-list.txt

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS.txt

      - name: Upload database snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gym-crew-phase1-db-snapshot
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
